name: AI Market Brief

on:
  workflow_dispatch:
  schedule:
    - cron: "0 7 * * *"

permissions:
  contents: write

jobs:
  generate-brief:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Generate premium market brief
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          python <<'PY'
          import json
          import os
          import urllib.request
          from datetime import datetime

          os.makedirs("data", exist_ok=True)

          def get_json(url):
              req = urllib.request.Request(url, headers={"User-Agent": "Mozilla/5.0"})
              with urllib.request.urlopen(req, timeout=20) as response:
                  return json.loads(response.read().decode("utf-8"))

          today = datetime.utcnow().strftime("%Y-%m-%d")

          fallback = {
              "date": today,
              "title": "Daily AI Market Brief",
              "btc_structure": "No bitcoin structure update available.",
              "eth_flows": "No ethereum flow update available.",
              "funding_oi": "No funding and open interest update available.",
              "volatility_outlook": "No volatility outlook available.",
              "top_narratives": "No narrative update available.",
              "macro_impact": "No macro impact update available.",
              "whale_flows": "No whale flow update available.",
              "risk": "No risk update available.",
              "focus": "No focus update available.",
              "full_report": "Unable to generate AI brief right now."
          }

          try:
              market_data = get_json(
                  "https://api.coingecko.com/api/v3/coins/markets"
                  "?vs_currency=usd&ids=bitcoin,ethereum,solana,binancecoin,xrp,litecoin"
                  "&price_change_percentage=24h"
              )

              global_data = get_json("https://api.coingecko.com/api/v3/global")

              rows = []
              for coin in market_data:
                  rows.append({
                      "name": coin.get("name"),
                      "symbol": coin.get("symbol", "").upper(),
                      "price": coin.get("current_price"),
                      "change_24h": coin.get("price_change_percentage_24h_in_currency"),
                      "market_cap": coin.get("market_cap"),
                      "volume": coin.get("total_volume")
                  })

              total_mcap = global_data.get("data", {}).get("total_market_cap", {}).get("usd")
              total_vol = global_data.get("data", {}).get("total_volume", {}).get("usd")
              btc_dom = global_data.get("data", {}).get("market_cap_percentage", {}).get("btc")
              eth_dom = global_data.get("data", {}).get("market_cap_percentage", {}).get("eth")

              api_key = os.environ.get("GEMINI_API_KEY", "").strip()

              if not api_key:
                  result = fallback
                  result["full_report"] = "Missing GEMINI_API_KEY secret."
              else:
                  prompt = f"""
          You are the CryptoMarketz AI desk.

          Write a premium Bloomberg-style crypto market brief for {today}.

          Use the market data below and create a calm, factual, information-dense report.
          Do not use hype language.
          Do not use markdown.
          Output VALID JSON only.

          Market data:
          Coins: {json.dumps(rows)}
          Total market cap USD: {total_mcap}
          Total volume USD: {total_vol}
          BTC dominance: {btc_dom}
          ETH dominance: {eth_dom}

          Return exactly this JSON structure:
          {{
            "date": "{today}",
            "title": "Daily AI Market Brief",
            "btc_structure": "2 to 4 sentences on bitcoin market structure, momentum, support resistance, and positioning",
            "eth_flows": "2 to 4 sentences on ethereum relative strength, capital rotation, and flow dynamics",
            "funding_oi": "2 to 4 sentences on derivatives tone, funding behavior, and speculative positioning",
            "volatility_outlook": "2 to 4 sentences on volatility expectations and liquidity conditions",
            "top_narratives": "3 to 5 short narrative themes in one compact paragraph",
            "macro_impact": "2 to 4 sentences on macro conditions, rates, dollar, liquidity, and risk appetite",
            "whale_flows": "2 to 4 sentences on larger wallet behavior, accumulation or distribution assumptions, and caution about inference limits",
            "risk": "1 to 3 sentences on the main risk to watch next",
            "focus": "1 to 3 sentences on what traders should focus on next",
            "full_report": "A strong 300 to 450 word market report that ties everything together in a professional Blockworks or Bloomberg style"
          }}

          Rules:
          - JSON only
          - no code blocks
          - no markdown
          - no bullet points
          - write like a market desk, not like a hype thread
          - if data is limited, be transparent and cautious rather than making things up
          """

                  url = f"https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key={api_key}"
                  payload = {
                      "contents": [
                          {
                              "parts": [
                                  {"text": prompt}
                              ]
                          }
                      ]
                  }

                  req = urllib.request.Request(
                      url,
                      data=json.dumps(payload).encode("utf-8"),
                      headers={"Content-Type": "application/json"},
                      method="POST"
                  )

                  with urllib.request.urlopen(req, timeout=45) as response:
                      raw = response.read().decode("utf-8")

                  parsed = json.loads(raw)
                  text = (
                      parsed.get("candidates", [{}])[0]
                      .get("content", {})
                      .get("parts", [{}])[0]
                      .get("text", "")
                      .strip()
                  )

                  if text.startswith("```json"):
                      text = text.replace("```json", "", 1).strip()
                  if text.startswith("```"):
                      text = text.replace("```", "", 1).strip()
                  if text.endswith("```"):
                      text = text[:-3].strip()

                  result = json.loads(text)

                  required_keys = [
                      "date", "title", "btc_structure", "eth_flows", "funding_oi",
                      "volatility_outlook", "top_narratives", "macro_impact",
                      "whale_flows", "risk", "focus", "full_report"
                  ]

                  for key in required_keys:
                      if key not in result:
                          result[key] = fallback[key]

          except Exception as e:
              result = fallback
              result["full_report"] = f"Workflow error: {str(e)}"

          with open("data/market-brief.json", "w", encoding="utf-8") as f:
              json.dump(result, f, ensure_ascii=False, indent=2)
          PY

      - name: Commit updated brief
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/market-brief.json
          git diff --cached --quiet || git commit -m "Update AI market brief"
          git push
