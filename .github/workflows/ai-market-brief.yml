name: AI Market Brief

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate-brief:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Generate placeholder market brief
        run: |
          mkdir -p data
          cat > data/market-brief.json <<'EOF'
          {
            "date": "AI Generated",
            "title": "Crypto Market Brief",
            "summary": "AI market brief generated",
            "btc": "",
            "eth": "",
            "narrative": "",
            "risk": "",
            "focus": ""
          }
          EOF

      - name: Commit updated brief
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add data/market-brief.json
          git commit -m "Update AI market brief" || echo "No changes"
          git push
