name: AI Market Brief

on:
  workflow_dispatch:
  schedule:
    - cron: "0 7 * * *"

permissions:
  contents: write

jobs:
  generate-brief:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Generate market brief with Gemini
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          python <<'PY'
          import json
          import os
          import urllib.request
          import urllib.error
          from datetime import datetime

          os.makedirs("data", exist_ok=True)

          prompt = """
          You are the CryptoMarketz AI desk.

          Write a professional daily crypto market brief as valid JSON only.

          Return exactly these keys:
          date
          title
          summary
          btc
          eth
          narrative
          risk
          focus

          Rules:
          - Keep it factual
          - Keep it concise
          - No markdown
          - No code fences
          - Output valid JSON only
          """

          api_key = os.environ.get("GEMINI_API_KEY", "")
          url = f"https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key={api_key}"

          payload = {
              "contents": [
                  {
                      "parts": [
                          {"text": prompt}
                      ]
                  }
              ]
          }

          fallback = {
              "date": datetime.utcnow().strftime("%Y-%m-%d"),
              "title": "Market Brief",
              "summary": "Gemini returned an empty or invalid response.",
              "btc": "",
              "eth": "",
              "narrative": "",
              "risk": "",
              "focus": ""
          }

          try:
              req = urllib.request.Request(
                  url,
                  data=json.dumps(payload).encode("utf-8"),
                  headers={"Content-Type": "application/json"},
                  method="POST"
              )

              with urllib.request.urlopen(req) as response:
                  raw = response.read().decode("utf-8")

              parsed = json.loads(raw)
              text = (
                  parsed.get("candidates", [{}])[0]
                  .get("content", {})
                  .get("parts", [{}])[0]
                  .get("text", "")
                  .strip()
              )

              try:
    req = urllib.request.Request(
        url,
        data=json.dumps(payload).encode("utf-8"),
        headers={"Content-Type": "application/json"},
        method="POST"
    )

    with urllib.request.urlopen(req) as response:
        raw = response.read().decode("utf-8")

    parsed = json.loads(raw)

    if "candidates" in parsed:
        text = parsed["candidates"][0]["content"]["parts"][0]["text"]

        try:
            result = json.loads(text)
        except:
            result = fallback
            result["summary"] = text
    else:
        result = fallback

except Exception as e:
    result = fallback
    result["summary"] = str(e)
              else:
                  try:
                      result = json.loads(text)
                  except Exception:
                      result = fallback
                      result["summary"] = text[:500]

          except Exception as e:
              result = fallback
              result["summary"] = f"Workflow error: {str(e)}"

          with open("data/market-brief.json", "w", encoding="utf-8") as f:
              json.dump(result, f, ensure_ascii=False, indent=2)
          PY

      - name: Commit updated brief
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/market-brief.json
          git diff --cached --quiet || git commit -m "Update AI market brief"
          git push
