name: AI Market Brief
on:
  workflow_dispatch:
  schedule:
    - cron: "0 7 * * *"
permissions:
  contents: write
jobs:
  generate-brief:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Generate AI market brief via Claude
        env:
          CLAUDE_API_KEY: ${{ secrets.CLAUDE_API_KEY }}
        run: python3 generate_brief.py
      - name: Commit and push updated brief
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/marketbrief.json
          git commit -m "Update AI market brief" || echo "No changes to commit"
          git pull --rebase origin main || true
          git push origin main
