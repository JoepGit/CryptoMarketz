name: AI Market Brief

on:
  workflow_dispatch:
  schedule:
    - cron: "0 7 * * *"

permissions:
  contents: write

jobs:
  generate-brief:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Generate brief
        run: |
          mkdir -p data
          cat <<EOF > data/market-brief.json
          {
            "date": "AI Generated",
            "title": "Crypto Market Brief",
            "summary": "Bitcoin is holding key support while liquidity rotates into mid caps.",
            "btc": "Neutral",
            "eth": "Constructive",
            "narrative": "AI Agents and DePIN remain dominant narratives.",
            "risk": "Volatility around macro data.",
            "focus": "Watch liquidity rotation."
          }
          EOF

      - name: Commit
        run: |
          git config user.name github-actions
          git config user.email actions@github.com
          git add data/market-brief.json
          git commit -m "update brief" || echo "no changes"
          git push
