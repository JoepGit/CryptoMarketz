name: AI Market Brief

on:
  workflow_dispatch:
  schedule:
    - cron: "0 7 * * *"

permissions:
  contents: write

jobs:
  generate-brief:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Generate market brief with Gemini
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          mkdir -p data

          PROMPT=$(cat <<'EOF'
          You are the CryptoMarketz AI desk.

          Write a professional daily crypto market brief as valid JSON only.

          Return exactly these keys:
          date
          title
          summary
          btc
          eth
          narrative
          risk
          focus

          Rules:
          - Keep it factual
          - Keep it concise
          - No markdown
          - No code fences
          - Output valid JSON only
          EOF
          )

          RESPONSE=$(curl -s \
            -H "Content-Type: application/json" \
            -X POST \
            "https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${GEMINI_API_KEY}" \
            -d "{
              \"contents\": [{
                \"parts\": [{
                  \"text\": $(jq -Rs . <<< "$PROMPT")
                }]
              }]
            }")

          TEXT=$(echo "$RESPONSE" | jq -r '.candidates[0].content.parts[0].text // empty')

if [ -z "$TEXT" ]; then
  TEXT='{
    "date": "AI error",
    "title": "Market Brief",
    "summary": "Gemini returned empty response",
    "btc": "",
    "eth": "",
    "narrative": "",
    "risk": "",
    "focus": ""
  }'
fi

echo "$TEXT" > data/market-brief.json

          echo "$TEXT" > data/market-brief.json

      - name: Commit updated brief
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/market-brief.json
          git diff --cached --quiet || git commit -m "Update AI market brief"
          git push
