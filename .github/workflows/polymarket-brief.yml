name: Polymarket Daily Brief

on:
  schedule:
    - cron: '0 7 * * *'
  workflow_dispatch:

jobs:
  brief:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Fetch and generate brief
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python3 .github/scripts/polymarket_brief.py

      - name: Commit
        run: |
          git config user.name "ZIMR Bot"
          git config user.email "bot@zimrcapital.com"
          git add data/polymarket-brief.json
          git diff --staged --quiet || git commit -m "Polymarket brief $(date -u +%Y-%m-%d)"
          git push
