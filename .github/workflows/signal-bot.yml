name: CryptoMarketz Signal Bot

on:
  schedule:
    - cron: '0 6,12,18,22 * * *'   # 4x per dag: 06:00, 12:00, 18:00, 22:00 UTC
  workflow_dispatch:

jobs:
  generate-signals:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install node-fetch@3

      - name: Run signal bot
        env:
          CLAUDE_API_KEY: ${{ secrets.CLAUDE_API_KEY }}
        run: node bot/signal-bot.js

      - name: Commit & push data files
        run: |
          git config user.name "Signal Bot"
          git config user.email "bot@cryptomarketz.com"
          git add data/signals.json data/results.json
          git diff --cached --quiet || git commit -m "🤖 Bot update $(date -u '+%Y-%m-%d %H:%M UTC')"
          git pull --rebase origin main || true
          git push origin main
