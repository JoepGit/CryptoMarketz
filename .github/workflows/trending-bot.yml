name: Update Trending Intelligence

on:
  schedule:
    - cron: '0 7 * * 1'   # Monday 07:00 UTC
    - cron: '0 7 * * 4'   # Thursday 07:00 UTC
  workflow_dispatch:        # manual trigger

permissions:
  contents: write

jobs:
  update-trending:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run trending bot
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python trending-bot.py

      - name: Commit data/trending.json
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/trending.json
          git stash
          git pull --rebase origin main
          git stash pop
          git add data/trending.json
          git diff --staged --quiet && echo "No changes" || \
          git commit -m "Update trending intelligence $(date -u '+%Y-%m-%d %H:%M UTC')" && \
          git push
