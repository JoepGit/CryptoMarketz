name: Polymarket Daily Brief

on:
  schedule:
    - cron: '0 7 * * *'  # Every day at 7:00 UTC (9:00 Amsterdam)
  workflow_dispatch:

jobs:
  brief:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Fetch Polymarket + Generate AI Brief
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          python3 - << 'PYEOF'
import urllib.request, json, datetime

# ── 1. Fetch top Polymarket markets ──
try:
    req = urllib.request.Request(
        'https://gamma-api.polymarket.com/markets?limit=40&active=true&order=volume24hr&ascending=false&closed=false',
        headers={'User-Agent': 'Mozilla/5.0', 'Accept': 'application/json'}
    )
    with urllib.request.urlopen(req, timeout=20) as r:
        markets = json.loads(r.read())
    print(f"Fetched {len(markets)} markets")
except Exception as e:
    print(f"Polymarket fetch failed: {e}")
    markets = []

if not markets:
    print("No markets, skipping")
    exit(0)

# ── 2. Process markets ──
def get_prob(m):
    try:
        prices = json.loads(m['outcomePrices']) if isinstance(m.get('outcomePrices'), str) else m.get('outcomePrices', [])
        if prices: return round(float(prices[0]) * 100)
    except: pass
    if m.get('lastTradePrice'): return round(float(m['lastTradePrice']) * 100)
    return 50

def get_change(m):
    if m.get('oneDayPriceChange'): return round(float(m['oneDayPriceChange']) * 100, 1)
    if m.get('price24hChange'): return round(float(m['price24hChange']) * 100, 1)
    return 0

def fmt_vol(v):
    v = float(v or 0)
    if v >= 1e6: return f'${v/1e6:.1f}M'
    if v >= 1e3: return f'${v/1e3:.0f}K'
    return f'${v:.0f}'

processed = []
for m in markets:
    prob = max(1, min(99, get_prob(m)))
    change = get_change(m)
    processed.append({
        'question': m.get('question', ''),
        'prob': prob,
        'change': change,
        'vol24': fmt_vol(m.get('volume24hr', 0)),
        'slug': m.get('slug', '')
    })

# Sort by absolute change for movers
movers = sorted(processed, key=lambda x: abs(x['change']), reverse=True)[:10]
top_vol = sorted(processed, key=lambda x: float(x['vol24'].replace('$','').replace('M','000000').replace('K','000')), reverse=True)[:5]

# ── 3. Build prompt for Claude ──
movers_text = '\n'.join([
    f"- {m['question']} | {m['prob']}% | {'+' if m['change']>0 else ''}{m['change']}% today | Vol: {m['vol24']}"
    for m in movers
])
vol_text = '\n'.join([
    f"- {m['question']} | {m['prob']}% | Vol: {m['vol24']}"
    for m in top_vol
])

today = datetime.datetime.utcnow().strftime('%A %B %d, %Y')
prompt = f"""You are the ZIMR Capital market intelligence analyst. Write a sharp, concise daily Polymarket briefing for {today}.

Top movers (24h price change):
{movers_text}

Highest volume markets today:
{vol_text}

Write a briefing with:
1. A punchy one-liner headline about what the market is saying today
2. 2-3 short paragraphs covering: biggest signals, what smart money is doing, any notable mispricings or opportunities
3. One clear "Watch List" with 2-3 specific markets to track today and why

Keep it direct, insightful, and useful for crypto traders. No fluff."""

# ── 4. Call Claude API ──
import os
api_key = os.environ.get('ANTHROPIC_API_KEY', '')
if not api_key:
    print("No API key found")
    exit(1)

try:
    payload = json.dumps({
        'model': 'claude-haiku-4-5-20251001',
        'max_tokens': 800,
        'messages': [{'role': 'user', 'content': prompt}]
    }).encode()
    
    req = urllib.request.Request(
        'https://api.anthropic.com/v1/messages',
        data=payload,
        headers={
            'Content-Type': 'application/json',
            'x-api-key': api_key,
            'anthropic-version': '2023-06-01'
        }
    )
    with urllib.request.urlopen(req, timeout=30) as r:
        resp = json.loads(r.read())
    
    brief_text = resp['content'][0]['text']
    print("AI brief generated successfully")
    print(brief_text[:200])

except Exception as e:
    print(f"Claude API failed: {e}")
    brief_text = "Brief generation failed today. Check back tomorrow."

# ── 5. Save to data/polymarket-brief.json ──
import os
os.makedirs('data', exist_ok=True)

output = {
    'date': today,
    'generated': datetime.datetime.utcnow().isoformat() + 'Z',
    'brief': brief_text,
    'top_movers': movers[:5],
    'top_vol': top_vol[:3]
}

with open('data/polymarket-brief.json', 'w') as f:
    json.dump(output, f, indent=2)

print(f"Saved to data/polymarket-brief.json")
PYEOF

      - name: Commit
        run: |
          git config user.name "ZIMR Bot"
          git config user.email "bot@zimrcapital.com"
          git add data/polymarket-brief.json
          git diff --staged --quiet || git commit -m "Polymarket brief $(date -u +%Y-%m-%d)"
          git push
