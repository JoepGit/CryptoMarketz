<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Political Trades &mdash; ZIMR Capital</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{--accent:#9b59d6;--bg:#0d0d0d;--card:#111111;--bdr:rgba(255,255,255,.07);--sub:#8a8078;--cream:#e8e0d8;--grn:#27ae60;--red:#e8392a;--yel:#f5c518}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Plus Jakarta Sans',sans-serif;background:var(--bg);color:var(--cream);min-height:100vh;-webkit-font-smoothing:antialiased}
.topbar{display:flex;align-items:center;justify-content:space-between;padding:0 28px;height:56px;background:linear-gradient(180deg,#151515,#111111);border-bottom:1px solid var(--bdr);position:sticky;top:0;z-index:50;gap:12px}
.tb-left{display:flex;align-items:center;gap:14px}
.tb-back{display:flex;align-items:center;gap:6px;font-family:'JetBrains Mono',monospace;font-size:9px;letter-spacing:.06em;color:var(--sub);text-decoration:none;padding:6px 12px;border:1px solid var(--bdr);border-radius:5px;transition:all .15s;background:rgba(255,255,255,.03)}
.tb-back:hover{color:var(--accent);border-color:rgba(155,89,214,.3)}
.tb-brand{display:flex;align-items:center;gap:10px}
.tb-bname{font-size:17px;font-weight:800;color:#fff}
.tb-bname span{color:var(--accent)}
.tb-right{display:flex;align-items:center;gap:8px}
.tb-pill{font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--sub);background:rgba(255,255,255,.04);border:1px solid var(--bdr);padding:4px 11px;border-radius:20px}
.tb-pill em{color:var(--accent);font-style:normal}
.btn-load{background:var(--accent);color:#fff;font-family:'JetBrains Mono',monospace;font-size:9px;font-weight:700;border:none;padding:8px 18px;border-radius:6px;cursor:pointer;letter-spacing:.08em;transition:opacity .15s}
.btn-load:hover{opacity:.85}
.btn-load:disabled{opacity:.35;cursor:not-allowed}

/* HERO */
.hero{padding:22px 28px 16px;border-bottom:1px solid var(--bdr)}
.hero-k{font-family:'JetBrains Mono',monospace;font-size:9px;font-weight:700;letter-spacing:.14em;color:rgba(155,89,214,.65);text-transform:uppercase;margin-bottom:6px}
.hero-t{font-size:22px;font-weight:800;letter-spacing:-.4px;margin-bottom:12px}
.hero-t span{color:var(--accent)}

/* FILTERS */
.filters{display:flex;gap:6px;flex-wrap:wrap}
.f-btn{font-family:'JetBrains Mono',monospace;font-size:9px;padding:6px 13px;border-radius:5px;border:1px solid var(--bdr);background:rgba(255,255,255,.04);color:var(--sub);cursor:pointer;letter-spacing:.06em;transition:all .15s}
.f-btn:hover,.f-btn.on{border-color:rgba(155,89,214,.4);color:var(--accent);background:rgba(155,89,214,.1)}
.f-btn.buy-on{border-color:rgba(39,174,96,.4);color:#27ae60;background:rgba(39,174,96,.1)}
.f-btn.sell-on{border-color:rgba(232,57,42,.4);color:#e8392a;background:rgba(232,57,42,.1)}

/* STATS */
.stats{display:flex;gap:0;border-bottom:1px solid var(--bdr)}
.stat-box{flex:1;padding:14px 20px;border-right:1px solid var(--bdr);text-align:center}
.stat-box:last-child{border-right:none}
.stat-num{font-family:'JetBrains Mono',monospace;font-size:20px;font-weight:700;margin-bottom:3px}
.stat-lbl{font-family:'JetBrains Mono',monospace;font-size:8px;color:var(--sub);letter-spacing:.08em;text-transform:uppercase}
.s-buy{color:#27ae60}
.s-sell{color:#e8392a}
.s-total{color:var(--accent)}
.s-week{color:var(--yel)}

/* WEEK SECTION */
.week-section{padding:16px 28px 0}
.week-lbl{font-family:'JetBrains Mono',monospace;font-size:9px;font-weight:700;letter-spacing:.1em;color:rgba(155,89,214,.55);text-transform:uppercase;margin-bottom:10px;display:flex;align-items:center;gap:8px}
.week-lbl::after{content:'';flex:1;height:1px;background:var(--bdr)}

/* TRADE CARDS */
.cards{padding:0 28px 60px;display:flex;flex-direction:column;gap:8px;margin-top:10px}
.trade-card{background:var(--card);border:1px solid var(--bdr);border-radius:10px;padding:14px 16px;display:grid;grid-template-columns:auto 1fr auto;gap:12px;align-items:center;transition:border-color .15s,background .12s;animation:fadeIn .3s ease both}
.trade-card:hover{border-color:rgba(155,89,214,.3);background:#141414}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.trade-card::before{display:none}

/* Left: avatar */
.t-av{width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:700;color:#fff;flex-shrink:0}

/* Middle */
.t-main{}
.t-name{font-size:14px;font-weight:800;letter-spacing:-.2px;margin-bottom:2px}
.t-sub{font-family:'JetBrains Mono',monospace;font-size:8px;color:var(--sub);letter-spacing:.04em;margin-bottom:6px}
.t-bottom{display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.t-ticker{font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:700;color:var(--cream);background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.08);padding:2px 8px;border-radius:4px}
.t-asset{font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--sub)}
.t-type{font-family:'JetBrains Mono',monospace;font-size:8px;font-weight:700;letter-spacing:.07em;padding:3px 8px;border-radius:4px}
.tt-buy{background:rgba(39,174,96,.12);color:#27ae60;border:1px solid rgba(39,174,96,.25)}
.tt-sell{background:rgba(232,57,42,.1);color:#e8392a;border:1px solid rgba(232,57,42,.22)}
.tt-other{background:rgba(155,89,214,.1);color:var(--accent);border:1px solid rgba(155,89,214,.22)}

/* Right */
.t-right{text-align:right;flex-shrink:0;min-width:110px}
.t-amount{font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:700;color:var(--cream);margin-bottom:4px}
.t-date{font-family:'JetBrains Mono',monospace;font-size:8px;color:var(--sub)}
.t-date strong{display:block;color:rgba(255,255,255,.6);font-size:10px;margin-bottom:1px}

/* Badges */
.party-r{background:rgba(220,38,38,.15);color:#f87171;border:1px solid rgba(220,38,38,.25);font-family:'JetBrains Mono',monospace;font-size:7px;padding:1px 5px;border-radius:3px;font-weight:700}
.party-d{background:rgba(37,99,235,.15);color:#60a5fa;border:1px solid rgba(37,99,235,.25);font-family:'JetBrains Mono',monospace;font-size:7px;padding:1px 5px;border-radius:3px;font-weight:700}
.party-i{background:rgba(155,89,214,.12);color:var(--accent);border:1px solid rgba(155,89,214,.22);font-family:'JetBrains Mono',monospace;font-size:7px;padding:1px 5px;border-radius:3px;font-weight:700}

/* PLACEHOLDER */
.placeholder{text-align:center;padding:60px 20px;font-family:'JetBrains Mono',monospace;font-size:11px;color:rgba(255,255,255,.2)}
.placeholder .ico{font-size:32px;display:block;margin-bottom:12px}
.placeholder p{line-height:2}
.ld-bar{width:160px;height:2px;background:var(--bdr);border-radius:2px;margin:14px auto 0;overflow:hidden}
.ld-fill{height:100%;background:var(--accent);border-radius:2px;animation:lda 1.3s ease-in-out infinite}
@keyframes lda{0%{width:0;margin-left:0}50%{width:100%;margin-left:0}100%{width:0;margin-left:100%}}
.err{background:rgba(232,57,42,.07);border:1px solid rgba(232,57,42,.18);border-radius:8px;padding:14px;font-family:'JetBrains Mono',monospace;font-size:11px;color:#ff9999;line-height:1.7;margin:20px 28px}

@media(max-width:600px){.topbar,.hero,.week-section,.cards{padding-left:14px;padding-right:14px}.trade-card{grid-template-columns:auto 1fr}.t-right{display:none}}
</style>
</head>

    <div class="tb-pill">Trades: <em id="tbCount">&#8212;</em></div>

<div class="hero">
  <div class="hero-k">ZIMR Capital &middot; Intelligence</div>
  <h1 class="hero-t">Political <span>Trades</span></h1>
  <div class="filters">
    <button class="f-btn on"   onclick="sf('all',this)">ALL</button>
    <button class="f-btn"      onclick="sf('week',this)">THIS WEEK</button>
    <button class="f-btn"      onclick="sf('buy',this)">BUY ONLY</button>
    <button class="f-btn"      onclick="sf('sell',this)">SELL ONLY</button>
    <button class="f-btn"      onclick="sf('rep',this)">REPUBLICAN</button>
    <button class="f-btn"      onclick="sf('dem',this)">DEMOCRAT</button>
  </div>
</div>

<!-- STATS -->
<div class="stats" id="statsRow" style="display:none">
  <div class="stat-box"><div class="stat-num s-total" id="st-total">0</div><div class="stat-lbl">Total Trades</div></div>
  <div class="stat-box"><div class="stat-num s-week" id="st-week">0</div><div class="stat-lbl">This Week</div></div>
  <div class="stat-box"><div class="stat-num s-buy" id="st-buy">0</div><div class="stat-lbl">Buys</div></div>
  <div class="stat-box"><div class="stat-num s-sell" id="st-sell">0</div><div class="stat-lbl">Sells</div></div>
</div>

<!-- RESULTS -->
<div id="weekLabel" class="week-section" style="display:none">
  <div class="week-lbl" id="weekLbl">Recent Trades</div>
</div>
<div class="cards" id="cards">
  <div class="placeholder">
    <span class="ico">&#127979;</span>
    <p>Loading Congress trades...<br>
    <span style="font-size:9px;opacity:.4">Stocks, ETFs &amp; Options &middot; Senate &amp; House</span></p>
    <div class="ld-bar"><div class="ld-fill"></div></div>
  </div>
</div>

<script>
var all = [], activeFilter = 'all';

var COLORS = ['#9b59d6','#3498db','#e74c3c','#2ecc71','#f39c12','#1abc9c','#e91e63','#00bcd4','#ff6b35','#a855f7'];
function cco(n){var h=0;for(var i=0;i<(n||'').length;i++)h=(h*31+n.charCodeAt(i))&0xffff;return COLORS[h%COLORS.length];}

function ini(name){return (name||'?').split(' ').map(function(w){return w[0]||'';}).join('').slice(0,2).toUpperCase();}

function partyClass(p){
  if(!p) return 'party-i';
  var l=p.toLowerCase();
  if(l.startsWith('r')) return 'party-r';
  if(l.startsWith('d')) return 'party-d';
  return 'party-i';
}
function partyLabel(p){
  if(!p) return 'IND';
  if(p.toLowerCase().startsWith('r')) return 'REP';
  if(p.toLowerCase().startsWith('d')) return 'DEM';
  return 'IND';
}

function typeClass(t){
  if(!t) return 'tt-other';
  var l=t.toLowerCase();
  if(l.includes('purchase')||l.includes('buy')) return 'tt-buy';
  if(l.includes('sale')||l.includes('sell')) return 'tt-sell';
  return 'tt-other';
}
function typeLabel(t){
  if(!t) return 'OTHER';
  var l=t.toLowerCase();
  if(l.includes('purchase')||l.includes('buy')) return 'BUY';
  if(l.includes('full')) return 'SELL (F)';
  if(l.includes('partial')) return 'SELL (P)';
  if(l.includes('sale')||l.includes('sell')) return 'SELL';
  return t.toUpperCase().slice(0,8);
}

function fmtDate(d){
  if(!d) return '&#8212;';
  try{
    var dt=new Date(d);
    return dt.toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});
  }catch(e){return d;}
}

function isThisWeek(d){
  if(!d) return false;
  var now=new Date(), dt=new Date(d);
  var diff=(now-dt)/(1000*60*60*24);
  return diff>=0 && diff<=7;
}

function sf(f,btn){
  activeFilter=f;
  document.querySelectorAll('.f-btn').forEach(function(b){b.classList.remove('on','buy-on','sell-on');});
  btn.classList.add(f==='buy'?'buy-on':f==='sell'?'sell-on':'on');
  render(filtered());
}

function filtered(){
  return all.filter(function(t){
    if(activeFilter==='week') return isThisWeek(t.date||t.traded);
    if(activeFilter==='buy')  return typeClass(t.type)==='tt-buy';
    if(activeFilter==='sell') return typeClass(t.type)==='tt-sell';
    if(activeFilter==='rep')  return (t.party||'').toLowerCase().startsWith('r');
    if(activeFilter==='dem')  return (t.party||'').toLowerCase().startsWith('d');
    return true;
  });
}

function updateStats(){
  var week=all.filter(function(t){return isThisWeek(t.date||t.traded);}).length;
  var buys=all.filter(function(t){return typeClass(t.type)==='tt-buy';}).length;
  var sells=all.filter(function(t){return typeClass(t.type)==='tt-sell';}).length;
  document.getElementById('st-total').textContent=all.length;
  document.getElementById('st-week').textContent=week;
  document.getElementById('st-buy').textContent=buys;
  document.getElementById('st-sell').textContent=sells;
  document.getElementById('statsRow').style.display='flex';
  document.getElementById('tbCount').textContent=all.length;
}

function render(trades){
  var el=document.getElementById('cards');
  var wl=document.getElementById('weekLabel');
  var wlbl=document.getElementById('weekLbl');

  if(!trades.length){
    wl.style.display='none';
    el.innerHTML='<div class="placeholder"><span class="ico">&#128269;</span><p>No trades match this filter</p></div>';
    return;
  }

  // Group: this week vs older
  var week=trades.filter(function(t){return isThisWeek(t.date||t.traded);});
  var older=trades.filter(function(t){return !isThisWeek(t.date||t.traded);});

  wl.style.display='block';
  if(week.length>0){
    wlbl.textContent='This Week ('+week.length+' trades)';
  } else {
    wlbl.textContent='Recent Trades';
  }

  var renderCard=function(t,i){
    var col=cco(t.name);
    var delay=(i*0.04)+'s';
    return '<div class="trade-card" style="animation-delay:'+delay+'">'+
      '<div class="t-av" style="background:'+col+'">'+ini(t.name)+'</div>'+
      '<div class="t-main">'+
        '<div class="t-name">'+t.name+'</div>'+
        '<div class="t-sub">'+
          '<span class="'+partyClass(t.party)+'">'+partyLabel(t.party)+'</span>'+
          (t.state?' &middot; '+t.state:'')+
          (t.chamber?' &middot; '+t.chamber:'')+
        '</div>'+
        '<div class="t-bottom">'+
          '<span class="t-ticker">'+(t.ticker||'--')+'</span>'+
          (t.asset_description?'<span class="t-asset">'+t.asset_description.slice(0,40)+'</span>':'')+
          '<span class="t-type '+typeClass(t.type)+'">'+typeLabel(t.type)+'</span>'+
        '</div>'+
      '</div>'+
      '<div class="t-right">'+
        '<div class="t-amount">'+(t.amount||'&#8212;')+'</div>'+
        '<div class="t-date"><strong>Disclosed</strong>'+fmtDate(t.date)+'</div>'+
        '<div class="t-date" style="margin-top:3px"><strong>Traded</strong>'+fmtDate(t.traded)+'</div>'+
      '</div>'+
    '</div>';
  };

  var html='';
  if(week.length) html+=week.map(renderCard).join('');
  if(older.length){
    if(week.length) html+='<div class="week-lbl" style="margin:16px 0 10px;font-family:JetBrains Mono,monospace;font-size:9px;font-weight:700;letter-spacing:.1em;color:rgba(255,255,255,.25);text-transform:uppercase;display:flex;align-items:center;gap:8px">Older<span style="flex:1;height:1px;background:rgba(255,255,255,.06);display:block"></span></div>';
    html+=older.map(function(t,i){return renderCard(t,week.length+i);}).join('');
  }

  el.innerHTML=html;
}

async function load(){
  var btn=document.getElementById('loadBtn');
  btn.disabled=true; btn.textContent='Loading...';
  document.getElementById('cards').innerHTML='<div class="placeholder"><span class="ico">&#9889;</span><p>Fetching Congress trades...</p><div class="ld-bar"><div class="ld-fill"></div></div></div>';
  document.getElementById('statsRow').style.display='none';
  document.getElementById('weekLabel').style.display='none';

  try{
    var r=await fetch('https://zimr-proxy.vercel.app/api/congress');
    if(!r.ok) throw new Error('HTTP '+r.status);
    var data=await r.json();
    var trades=Array.isArray(data)?data:(data.trades||data.data||data.results||[]);
    if(!trades.length) throw new Error('No trades returned');

    // Sort newest first
    trades.sort(function(a,b){
      var da=new Date(a.date||a.traded||0), db=new Date(b.date||b.traded||0);
      return db-da;
    });

    all=trades;
    updateStats();
    render(filtered());
  }catch(e){
    document.getElementById('cards').innerHTML='<div class="err">&#9888; '+e.message+'</div>';
  }

  btn.disabled=false; btn.textContent='&#8635; REFRESH';
}

window.addEventListener('load',load);
</script>
</body>
</html>
