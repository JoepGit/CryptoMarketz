<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Polymarket — ZIMR Capital</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Inter', sans-serif;
  background: #0d0d11;
  color: #e2e2e8;
  height: 100vh;
  overflow: hidden;
  display: flex;
  flex-direction: column;
  font-size: 13px;
}

/* ── Topbar ── */
.topbar {
  background: #111116;
  border-bottom: 1px solid #1e1e2a;
  padding: 0 20px;
  height: 46px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-shrink: 0;
}
.topbar-left { display: flex; align-items: center; gap: 16px; }
.back-btn {
  display: flex; align-items: center; gap: 6px;
  color: #6b6b80; text-decoration: none;
  font-size: 12px; font-weight: 500;
  transition: color .15s;
}
.back-btn:hover { color: #e2e2e8; }
.logo { font-size: 15px; font-weight: 700; color: #fff; letter-spacing: -.01em; }
.logo span { color: #9b59d6; }
.tabs { display: flex; gap: 2px; margin-left: 4px; }
.tab { background: none; border: none; padding: 5px 14px; border-radius: 20px; font-size: 12px; font-weight: 500; color: #6b6b80; cursor: pointer; font-family: inherit; transition: all .15s; }
.tab:hover { color: #e2e2e8; }
.tab.active { background: #9b59d6; color: #fff; }
.topbar-right { display: flex; align-items: center; gap: 14px; }
.live { display: flex; align-items: center; gap: 5px; font-size: 11px; color: #4ade80; font-weight: 500; }
.live-dot { width: 6px; height: 6px; background: #4ade80; border-radius: 50%; box-shadow: 0 0 6px #4ade80; animation: blink 2s infinite; }
@keyframes blink { 0%,100%{opacity:1}50%{opacity:.3} }
.clock { font-size: 11px; color: #4a4a5a; font-variant-numeric: tabular-nums; }
.btn { background: #1a1a22; border: 1px solid #2a2a38; border-radius: 6px; padding: 5px 12px; font-size: 11px; font-weight: 500; color: #9b59d6; cursor: pointer; font-family: inherit; transition: all .15s; }
.btn:hover { border-color: #9b59d6; }

/* ── Stats bar ── */
.stats-bar { display: grid; grid-template-columns: repeat(5,1fr); border-bottom: 1px solid #1e1e2a; flex-shrink: 0; background: #111116; }
.stat { padding: 10px 18px; border-right: 1px solid #1e1e2a; }
.stat:last-child { border-right: none; }
.slbl { font-size: 9px; font-weight: 600; color: #4a4a5a; text-transform: uppercase; letter-spacing: .08em; margin-bottom: 3px; }
.sval { font-size: 18px; font-weight: 700; color: #fff; line-height: 1; margin-bottom: 2px; font-variant-numeric: tabular-nums; }
.schg { font-size: 11px; font-weight: 500; }
.up { color: #4ade80; }
.dn { color: #f87171; }
.neu { color: #4a4a5a; }
.yel { color: #fbbf24; }

/* ── Layout ── */
.main { display: grid; grid-template-columns: 1fr 320px; flex: 1; overflow: hidden; }
.left { display: flex; flex-direction: column; overflow: hidden; border-right: 1px solid #1e1e2a; }

/* Filter bar */
.filter-bar {
  display: flex; align-items: center; gap: 8px;
  padding: 10px 16px;
  border-bottom: 1px solid #1e1e2a;
  flex-shrink: 0;
  flex-wrap: wrap;
}
.filter-label { font-size: 10px; font-weight: 600; color: #4a4a5a; text-transform: uppercase; letter-spacing: .08em; margin-right: 4px; }
.filter-btn {
  background: none; border: 1px solid #1e1e2a;
  border-radius: 20px; padding: 4px 12px;
  font-size: 11px; font-weight: 500; color: #6b6b80;
  cursor: pointer; font-family: inherit; transition: all .15s;
}
.filter-btn:hover { border-color: #2e2e42; color: #e2e2e8; }
.filter-btn.active { background: rgba(155,89,214,.12); border-color: rgba(155,89,214,.4); color: #9b59d6; }
.search-input {
  margin-left: auto;
  background: #111116; border: 1px solid #1e1e2a;
  border-radius: 6px; padding: 5px 12px;
  font-size: 11px; color: #e2e2e8; font-family: inherit;
  width: 180px; outline: none; transition: border-color .15s;
}
.search-input:focus { border-color: #9b59d6; }
.search-input::placeholder { color: #4a4a5a; }

/* Table */
.tbl-wrap { flex: 1; overflow: hidden; display: flex; flex-direction: column; }
.tbl-hdr {
  display: grid;
  grid-template-columns: 28px 1fr 90px 80px 80px 90px 80px;
  gap: 4px; padding: 8px 16px;
  border-bottom: 1px solid #1a1a24;
  background: #0d0d11;
  flex-shrink: 0;
}
.tbl-hdr span { font-size: 9px; font-weight: 600; color: #4a4a5a; text-transform: uppercase; letter-spacing: .05em; cursor: pointer; user-select: none; }
.tbl-hdr span:hover { color: #9b59d6; }
.tbl-hdr span:nth-child(n+3) { text-align: right; }
.tbl-body { flex: 1; overflow-y: auto; }
.tbl-body::-webkit-scrollbar { width: 4px; }
.tbl-body::-webkit-scrollbar-thumb { background: #2a2a38; border-radius: 2px; }

.mrow {
  display: grid;
  grid-template-columns: 28px 1fr 90px 80px 80px 90px 80px;
  gap: 4px; padding: 10px 16px;
  border-bottom: 1px solid #131318;
  align-items: center;
  cursor: pointer;
  transition: background .1s;
  text-decoration: none;
  color: inherit;
}
.mrow:hover { background: #13131a; }

.rnum { font-size: 10px; color: #3a3a4a; }
.mq { font-size: 12px; font-weight: 500; color: #e2e2e8; min-width: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.mq-sub { font-size: 10px; color: #4a4a5a; margin-top: 1px; }

/* Probability bar */
.prob-wrap { display: flex; align-items: center; gap: 6px; justify-content: flex-end; }
.prob-pct { font-size: 12px; font-weight: 700; font-variant-numeric: tabular-nums; min-width: 32px; text-align: right; }
.prob-bar { width: 40px; height: 4px; background: #1e1e2a; border-radius: 2px; overflow: hidden; flex-shrink: 0; }
.prob-fill { height: 100%; border-radius: 2px; }

.cat-pill {
  display: inline-flex; align-items: center;
  font-size: 9px; font-weight: 700; letter-spacing: .04em;
  padding: 2px 7px; border-radius: 10px; text-transform: uppercase;
}
.cat-crypto { background: rgba(155,89,214,.12); color: #9b59d6; }
.cat-politics { background: rgba(59,130,246,.12); color: #60a5fa; }
.cat-sports { background: rgba(74,222,128,.1); color: #4ade80; }
.cat-other { background: rgba(251,191,36,.1); color: #fbbf24; }

.rval { font-size: 11px; font-weight: 500; text-align: right; font-variant-numeric: tabular-nums; }
.rchg { font-size: 11px; font-weight: 600; text-align: right; font-variant-numeric: tabular-nums; }

/* ── Right sidebar ── */
.right { display: flex; flex-direction: column; overflow: hidden; }
.sb-hdr { padding: 11px 14px; border-bottom: 1px solid #1e1e2a; display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; }
.sb-title { font-size: 12px; font-weight: 600; color: #c0c0d0; }
.sb-note { font-size: 10px; color: #4a4a5a; }
.sb-scroll { flex: 1; overflow-y: auto; padding: 12px; }
.sb-scroll::-webkit-scrollbar { width: 4px; }
.sb-scroll::-webkit-scrollbar-thumb { background: #2a2a38; border-radius: 2px; }

/* Alert cards in sidebar */
.alert-card {
  background: #111116;
  border: 1px solid #1e1e2a;
  border-radius: 8px;
  padding: 12px;
  margin-bottom: 8px;
  text-decoration: none;
  display: block;
  transition: border-color .15s;
}
.alert-card:hover { border-color: #2e2e42; }
.al-type {
  font-size: 9px; font-weight: 700; letter-spacing: .08em;
  text-transform: uppercase; margin-bottom: 5px;
}
.al-type.up { color: #4ade80; }
.al-type.dn { color: #f87171; }
.al-type.mis { color: #fbbf24; }
.al-type.hot { color: #9b59d6; }
.al-q { font-size: 12px; font-weight: 600; color: #e2e2e8; line-height: 1.35; margin-bottom: 6px; }
.al-why { font-size: 10px; color: #6b6b80; line-height: 1.4; margin-bottom: 8px; }
.al-stats { display: flex; gap: 10px; align-items: center; }
.al-prob { font-size: 16px; font-weight: 700; }
.al-chg { font-size: 11px; font-weight: 600; }
.al-vol { font-size: 10px; color: #4a4a5a; margin-left: auto; }

/* Loading */
.ld { display: flex; align-items: center; justify-content: center; gap: 8px; padding: 60px; color: #4a4a5a; font-size: 11px; flex-direction: column; }
.spin { width: 18px; height: 18px; border: 1.5px solid #2a2a38; border-top-color: #9b59d6; border-radius: 50%; animation: spin .6s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }

/* Brief panel */
.brief-panel {
  border-top: 1px solid #1e1e2a;
  flex-shrink: 0;
  max-height: 0;
  overflow: hidden;
  transition: max-height .3s ease;
}
.brief-panel.open { max-height: 200px; }
.brief-inner { padding: 12px 14px; overflow-y: auto; max-height: 200px; }
.brief-inner::-webkit-scrollbar { width: 3px; }
.brief-inner::-webkit-scrollbar-thumb { background: #2a2a38; }
.brief-inner p { font-size: 11px; color: #c0c0d0; line-height: 1.6; margin-bottom: 8px; }
.brief-inner p:last-child { margin-bottom: 0; }
.brief-btn {
  display: flex; align-items: center; gap: 6px;
  background: none; border: 1px solid #1e1e2a;
  border-radius: 6px; padding: 5px 12px;
  font-size: 11px; font-weight: 500; color: #9b59d6;
  cursor: pointer; font-family: inherit; transition: all .15s;
}
.brief-btn:hover { border-color: #9b59d6; background: rgba(155,89,214,.06); }
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-left">
    <a href="#" onclick="history.back();return false;" class="back-btn">
      <svg viewBox="0 0 24 24" style="width:14px;height:14px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;"><path d="M19 12H5M12 5l-7 7 7 7"/></svg>
      Dashboard
    </a>
    <div class="logo">ZIMR <span>Polymarket</span></div>
    <div class="tabs">
      <button class="tab active" onclick="setSort('volume',this)">Top Volume</button>
      <button class="tab" onclick="setSort('change',this)">Top Movers</button>
      <button class="tab" onclick="setSort('prob',this)">Highest Prob</button>
    </div>
  </div>
  <div class="topbar-right">
    <button class="brief-btn" onclick="toggleBrief()">&#10024; Daily Brief</button>
    <div class="live"><div class="live-dot"></div>Live</div>
    <span class="clock" id="clock">-</span>
    <button class="btn" onclick="load()">&#8635; Refresh</button>
  </div>
</div>

<!-- Stats -->
<div class="stats-bar">
  <div class="stat"><div class="slbl">Markets Tracked</div><div class="sval" id="s-total">-</div><div class="schg neu">active markets</div></div>
  <div class="stat"><div class="slbl">Total 24H Volume</div><div class="sval" id="s-vol">-</div><div class="schg neu">across all markets</div></div>
  <div class="stat"><div class="slbl">Top Mover</div><div class="sval" id="s-mover">-</div><div class="schg" id="s-mover-c">-</div></div>
  <div class="stat"><div class="slbl">Biggest Market</div><div class="sval" id="s-biggest">-</div><div class="schg" id="s-biggest-v">-</div></div>
  <div class="stat"><div class="slbl">Crypto Markets</div><div class="sval" id="s-crypto">-</div><div class="schg" id="s-crypto-c">neu">-</div></div>
</div>

<!-- Main -->
<div class="main">
  <div class="left">

    <!-- Brief panel -->
    <div class="brief-panel" id="brief-panel">
      <div class="brief-inner" id="brief-body">
        <p style="color:#4a4a5a;">Loading brief...</p>
      </div>
    </div>

    <!-- Filters -->
    <div class="filter-bar">
      <span class="filter-label">Category</span>
      <button class="filter-btn active" onclick="setFilter('all',this)">All</button>
      <button class="filter-btn" onclick="setFilter('crypto',this)">Crypto</button>
      <button class="filter-btn" onclick="setFilter('politics',this)">Politics</button>
      <button class="filter-btn" onclick="setFilter('sports',this)">Sports</button>
      <button class="filter-btn" onclick="setFilter('other',this)">Other</button>
      <input class="search-input" type="text" id="search" placeholder="Search markets..." oninput="renderTable()">
    </div>

    <!-- Table -->
    <div class="tbl-wrap">
      <div class="tbl-hdr">
        <span>#</span>
        <span>Market</span>
        <span>Probability</span>
        <span>24H Chg</span>
        <span>24H Volume</span>
        <span>Category</span>
        <span>Ends</span>
      </div>
      <div class="tbl-body" id="tbl-body">
        <div class="ld"><div class="spin"></div>Loading markets...</div>
      </div>
    </div>
  </div>

  <!-- Sidebar -->
  <div class="right">
    <div class="sb-hdr">
      <span class="sb-title">Market Signals</span>
      <span class="sb-note" id="sb-note">-</span>
    </div>
    <div class="sb-scroll" id="sb-body">
      <div class="ld"><div class="spin"></div></div>
    </div>
  </div>
</div>

<script>
let allMarkets=[], currentFilter='all', currentSort='volume';

// Clock
setInterval(()=>{
  document.getElementById('clock').textContent=
    new Date().toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit',second:'2-digit'});
},1000);

// Helpers
function fmtVol(n){
  n=parseFloat(n||0);
  if(n>=1e6)return '$'+(n/1e6).toFixed(1)+'M';
  if(n>=1e3)return '$'+(n/1e3).toFixed(0)+'K';
  return '$'+n.toFixed(0);
}
function getProb(m){
  if(m.outcomePrices){
    try{const p=JSON.parse(m.outcomePrices);return Math.round(parseFloat(p[0]||0)*100);}catch(e){}
  }
  if(typeof m.probability==='number')return Math.round(m.probability*100);
  return 50;
}
function getChange(m){
  return parseFloat(m.lastTradePrice24hr||m.priceChange24h||m.change24h||0)*100;
}
function getCategory(m){
  const t=((m.category||m.tags||'')+'').toLowerCase();
  if(t.includes('crypto')||t.includes('bitcoin')||t.includes('eth'))return 'crypto';
  if(t.includes('polit')||t.includes('elect')||t.includes('trump')||t.includes('president'))return 'politics';
  if(t.includes('sport')||t.includes('nba')||t.includes('nfl')||t.includes('soccer')||t.includes('football')||t.includes('tennis'))return 'sports';
  return 'other';
}
function probColor(p){return p>60?'#4ade80':p>40?'#fbbf24':'#f87171';}

// Sort & filter
function setSort(s,btn){
  currentSort=s;
  document.querySelectorAll('.tab').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  renderTable();
}
function setFilter(f,btn){
  currentFilter=f;
  document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  renderTable();
}

function filtered(){
  const q=document.getElementById('search').value.toLowerCase().trim();
  let m=[...allMarkets];
  if(currentFilter!=='all')m=m.filter(x=>x._cat===currentFilter);
  if(q)m=m.filter(x=>x.question.toLowerCase().includes(q));
  m.sort((a,b)=>{
    if(currentSort==='volume')return parseFloat(b.volume24hr||0)-parseFloat(a.volume24hr||0);
    if(currentSort==='change')return Math.abs(b._change)-Math.abs(a._change);
    if(currentSort==='prob')return b._prob-a._prob;
    return 0;
  });
  return m;
}

// Render table
function renderTable(){
  const markets=filtered();
  if(!markets.length){
    document.getElementById('tbl-body').innerHTML='<div class="ld">No markets match this filter</div>';
    return;
  }
  document.getElementById('tbl-body').innerHTML=markets.map((m,i)=>{
    const prob=m._prob, change=m._change, col=probColor(prob);
    const chgCls=change>2?'up':change<-2?'dn':'neu';
    const chgTxt=(change>0?'+':'')+change.toFixed(1)+'%';
    const ends=m.endDate?new Date(m.endDate).toLocaleDateString('en-GB',{day:'numeric',month:'short'}):'';
    const url='https://polymarket.com/event/'+(m.slug||'');
    return `<a class="mrow" href="${url}" target="_blank" rel="noopener">
      <span class="rnum">${i+1}</span>
      <div>
        <div class="mq">${m.question}</div>
        <div class="mq-sub">Vol ${fmtVol(m.volume24hr)}</div>
      </div>
      <div class="prob-wrap">
        <span class="prob-pct" style="color:${col}">${prob}%</span>
        <div class="prob-bar"><div class="prob-fill" style="width:${prob}%;background:${col}"></div></div>
      </div>
      <span class="rchg ${chgCls}">${chgTxt}</span>
      <span class="rval">${fmtVol(m.volume24hr)}</span>
      <span><span class="cat-pill cat-${m._cat}">${m._cat}</span></span>
      <span class="rval" style="font-size:10px;color:#4a4a5a;">${ends}</span>
    </a>`;
  }).join('');
}

// Stats
function renderStats(){
  document.getElementById('s-total').textContent=allMarkets.length;
  const totalVol=allMarkets.reduce((s,m)=>s+parseFloat(m.volume24hr||0),0);
  document.getElementById('s-vol').textContent=fmtVol(totalVol);

  const mover=[...allMarkets].sort((a,b)=>Math.abs(b._change)-Math.abs(a._change))[0];
  if(mover){
    document.getElementById('s-mover').textContent=mover._prob+'%';
    const el=document.getElementById('s-mover-c');
    el.textContent=(mover._change>0?'+':'')+mover._change.toFixed(1)+'% - '+mover.question.slice(0,30)+'...';
    el.className='schg '+(mover._change>0?'up':'dn');
  }

  const biggest=[...allMarkets].sort((a,b)=>parseFloat(b.volume24hr||0)-parseFloat(a.volume24hr||0))[0];
  if(biggest){
    document.getElementById('s-biggest').textContent=fmtVol(biggest.volume24hr);
    document.getElementById('s-biggest-v').textContent=biggest.question.slice(0,28)+'...';
  }

  const crypto=allMarkets.filter(m=>m._cat==='crypto');
  document.getElementById('s-crypto').textContent=crypto.length;
  const cryptoVol=crypto.reduce((s,m)=>s+parseFloat(m.volume24hr||0),0);
  document.getElementById('s-crypto-c').textContent=fmtVol(cryptoVol)+' volume';
}

// Sidebar signals
function renderSidebar(){
  const alerts=[];
  // Big movers up
  allMarkets.filter(m=>m._change>=10).sort((a,b)=>b._change-a._change).slice(0,2).forEach(m=>{
    alerts.push({type:'up',label:'SURGING',q:m.question,why:'Up '+m._change.toFixed(1)+'% in 24H with significant volume.',prob:m._prob,chg:'+'+m._change.toFixed(1)+'%',vol:fmtVol(m.volume24hr),url:'https://polymarket.com/event/'+(m.slug||'')});
  });
  // Big movers down
  allMarkets.filter(m=>m._change<=-10).sort((a,b)=>a._change-b._change).slice(0,2).forEach(m=>{
    alerts.push({type:'dn',label:'COLLAPSING',q:m.question,why:'Down '+Math.abs(m._change).toFixed(1)+'% in 24H.',prob:m._prob,chg:m._change.toFixed(1)+'%',vol:fmtVol(m.volume24hr),url:'https://polymarket.com/event/'+(m.slug||'')});
  });
  // High volume
  allMarkets.filter(m=>parseFloat(m.volume24hr||0)>500000).sort((a,b)=>parseFloat(b.volume24hr||0)-parseFloat(a.volume24hr||0)).slice(0,2).forEach(m=>{
    alerts.push({type:'hot',label:'HIGH VOLUME',q:m.question,why:'Over '+fmtVol(m.volume24hr)+' traded in 24H.',prob:m._prob,chg:(m._change>0?'+':'')+m._change.toFixed(1)+'%',vol:fmtVol(m.volume24hr),url:'https://polymarket.com/event/'+(m.slug||'')});
  });
  // Near certain
  allMarkets.filter(m=>m._prob>=90&&parseFloat(m.volume24hr||0)>50000).slice(0,2).forEach(m=>{
    alerts.push({type:'mis',label:'NEAR CERTAIN',q:m.question,why:'At '+m._prob+'% - almost priced in. Watch for surprise.',prob:m._prob,chg:(m._change>0?'+':'')+m._change.toFixed(1)+'%',vol:fmtVol(m.volume24hr),url:'https://polymarket.com/event/'+(m.slug||'')});
  });

  document.getElementById('sb-note').textContent=alerts.length+' signals';
  if(!alerts.length){
    document.getElementById('sb-body').innerHTML='<div class="ld" style="padding:24px;font-size:11px;">No signals — markets are calm</div>';
    return;
  }
  document.getElementById('sb-body').innerHTML=alerts.map(a=>{
    const col=a.prob>60?'#4ade80':a.prob>40?'#fbbf24':'#f87171';
    return `<a class="alert-card" href="${a.url}" target="_blank" rel="noopener">
      <div class="al-type ${a.type}">${a.label}</div>
      <div class="al-q">${a.question||a.q}</div>
      <div class="al-why">${a.why}</div>
      <div class="al-stats">
        <span class="al-prob" style="color:${col}">${a.prob}%</span>
        <span class="al-chg ${a.type==='up'?'up':a.type==='dn'?'dn':'neu'}">${a.chg}</span>
        <span class="al-vol">${a.vol} vol</span>
      </div>
    </a>`;
  }).join('');
}

// Brief
let briefOpen=false;
function toggleBrief(){
  briefOpen=!briefOpen;
  document.getElementById('brief-panel').classList.toggle('open',briefOpen);
  if(briefOpen)loadBrief();
}
async function loadBrief(){
  const box=document.getElementById('brief-body');
  try{
    const r=await fetch('https://raw.githubusercontent.com/SevillaWZRD/CryptoMarketz/main/data/polymarket-brief.json?'+Date.now());
    if(!r.ok)throw new Error('Not available');
    const d=await r.json();
    box.innerHTML=d.brief.split('\n\n').filter(p=>p.trim()).map(p=>'<p>'+p.trim()+'</p>').join('');
  }catch(e){
    box.innerHTML='<p style="color:#4a4a5a;">No brief available yet - generated daily at 09:00.</p>';
  }
}

// Load markets
async function load(){
  document.getElementById('tbl-body').innerHTML='<div class="ld"><div class="spin"></div>Loading markets...</div>';
  try{
    const r=await fetch('https://zimr-proxy.vercel.app/api/polymarket');
    if(!r.ok)throw new Error('HTTP '+r.status);
    const data=await r.json();
    let markets=Array.isArray(data)?data:(data.markets||data.data||[]);
    if(!markets.length)throw new Error('No markets returned');
    allMarkets=markets.map(m=>{
      m._prob=Math.max(1,Math.min(99,getProb(m)));
      m._change=parseFloat(getChange(m).toFixed(1));
      m._cat=getCategory(m);
      return m;
    });
    renderStats();
    renderTable();
    renderSidebar();
  }catch(e){
    document.getElementById('tbl-body').innerHTML=`<div class="ld" style="color:#f87171;">Failed to load: ${e.message}</div>`;
  }
}

load();
setInterval(load, 5*60*1000);
</script>
