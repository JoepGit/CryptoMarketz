<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Polymarket Intelligence &mdash; ZIMR Capital</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{--accent:#9b59d6;--bg:#0d0d0d;--card:#111111;--bdr:rgba(255,255,255,.07);--sub:#8a8078;--cream:#e8e0d8;--grn:#27ae60;--red:#e8392a;--yel:#f5c518;--orange:#f97316}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Plus Jakarta Sans',sans-serif;background:var(--bg);color:var(--cream);min-height:100vh;-webkit-font-smoothing:antialiased}

/* TOPBAR */
.topbar{display:flex;align-items:center;justify-content:space-between;padding:0 28px;height:56px;background:linear-gradient(180deg,#151515,#111111);border-bottom:1px solid var(--bdr);position:sticky;top:0;z-index:50;gap:12px}
.tb-left{display:flex;align-items:center;gap:14px}
.tb-back{display:flex;align-items:center;gap:6px;font-family:'JetBrains Mono',monospace;font-size:9px;letter-spacing:.06em;color:var(--sub);text-decoration:none;padding:6px 12px;border:1px solid var(--bdr);border-radius:5px;transition:all .15s;background:rgba(255,255,255,.03)}
.tb-back:hover{color:var(--accent);border-color:rgba(155,89,214,.3)}
.tb-brand{display:flex;align-items:center;gap:10px}
.tb-bname{font-size:17px;font-weight:800;color:#fff}
.tb-bname span{color:var(--accent)}
.tb-right{display:flex;align-items:center;gap:8px}
.tb-pill{font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--sub);background:rgba(255,255,255,.04);border:1px solid var(--bdr);padding:4px 11px;border-radius:20px}
.tb-pill em{color:var(--accent);font-style:normal}
.tb-dot{width:7px;height:7px;border-radius:50%;background:var(--grn);animation:pulse 1.5s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.35;transform:scale(.65)}}
.btn{background:var(--accent);color:#fff;font-family:'JetBrains Mono',monospace;font-size:9px;font-weight:700;border:none;padding:8px 18px;border-radius:6px;cursor:pointer;letter-spacing:.08em;transition:opacity .15s}
.btn:hover{opacity:.85}
.btn:disabled{opacity:.35;cursor:not-allowed}

/* HERO */
.hero{padding:22px 28px 16px;border-bottom:1px solid var(--bdr)}
.hero-k{font-family:'JetBrains Mono',monospace;font-size:9px;font-weight:700;letter-spacing:.14em;color:rgba(155,89,214,.65);text-transform:uppercase;margin-bottom:6px}
.hero-t{font-size:22px;font-weight:800;letter-spacing:-.4px;margin-bottom:12px}
.hero-t span{color:var(--accent)}
.filters{display:flex;gap:6px;flex-wrap:wrap;align-items:center}
.f-btn{font-family:'JetBrains Mono',monospace;font-size:9px;padding:6px 13px;border-radius:5px;border:1px solid var(--bdr);background:rgba(255,255,255,.04);color:var(--sub);cursor:pointer;letter-spacing:.06em;transition:all .15s}
.f-btn:hover,.f-btn.on{border-color:rgba(155,89,214,.4);color:var(--accent);background:rgba(155,89,214,.1)}

/* STATS BAR */
.stats{display:flex;gap:0;border-bottom:1px solid var(--bdr)}
.stat-box{flex:1;padding:12px 20px;border-right:1px solid var(--bdr);text-align:center}
.stat-box:last-child{border-right:none}
.stat-num{font-family:'JetBrains Mono',monospace;font-size:18px;font-weight:700;margin-bottom:2px}
.stat-lbl{font-family:'JetBrains Mono',monospace;font-size:8px;color:var(--sub);letter-spacing:.08em;text-transform:uppercase}

/* GRID */
.grid{padding:18px 28px 60px;display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:12px}

/* MARKET CARD */
.mcard{background:var(--card);border:1px solid var(--bdr);border-radius:10px;padding:16px;cursor:pointer;text-decoration:none;color:inherit;transition:border-color .15s,background .12s,transform .1s;animation:fadeIn .3s ease both;display:flex;flex-direction:column;gap:10px;position:relative;overflow:hidden}
.mcard:hover{border-color:rgba(155,89,214,.35);background:#141414;transform:translateY(-1px)}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.mcard::before{content:'';position:absolute;top:0;left:0;right:0;height:2px}
.mcard.crypto::before{background:linear-gradient(90deg,#f97316,#f5c518)}
.mcard.politics::before{background:linear-gradient(90deg,#3b82f6,#8b5cf6)}
.mcard.sports::before{background:linear-gradient(90deg,#27ae60,#06b6d4)}
.mcard.other::before{background:linear-gradient(90deg,#9b59d6,#3b82f6)}

/* Card header */
.mc-head{display:flex;align-items:flex-start;justify-content:space-between;gap:10px}
.mc-cat{font-family:'JetBrains Mono',monospace;font-size:7px;font-weight:700;letter-spacing:.1em;padding:2px 7px;border-radius:3px;text-transform:uppercase;flex-shrink:0}
.cat-crypto{background:rgba(249,115,22,.12);color:#f97316;border:1px solid rgba(249,115,22,.25)}
.cat-politics{background:rgba(59,130,246,.1);color:#60a5fa;border:1px solid rgba(59,130,246,.2)}
.cat-sports{background:rgba(39,174,96,.1);color:#27ae60;border:1px solid rgba(39,174,96,.2)}
.cat-other{background:rgba(155,89,214,.1);color:var(--accent);border:1px solid rgba(155,89,214,.2)}

/* Question */
.mc-q{font-size:14px;font-weight:700;line-height:1.4;color:var(--cream)}

/* Probability bar */
.prob-row{display:flex;align-items:center;gap:10px}
.prob-yes{font-family:'JetBrains Mono',monospace;font-size:22px;font-weight:800;flex-shrink:0}
.prob-bar-wrap{flex:1}
.prob-bar-track{width:100%;height:6px;background:rgba(255,255,255,.06);border-radius:3px;overflow:hidden;margin-bottom:4px}
.prob-bar-yes{height:100%;border-radius:3px;transition:width .6s ease}
.prob-labels{display:flex;justify-content:space-between;font-family:'JetBrains Mono',monospace;font-size:8px;color:rgba(255,255,255,.3)}

/* Change badge */
.change-badge{font-family:'JetBrains Mono',monospace;font-size:9px;font-weight:700;padding:3px 8px;border-radius:4px;flex-shrink:0}
.ch-up{background:rgba(39,174,96,.12);color:#27ae60;border:1px solid rgba(39,174,96,.25)}
.ch-dn{background:rgba(232,57,42,.1);color:#e8392a;border:1px solid rgba(232,57,42,.2)}
.ch-flat{background:rgba(255,255,255,.05);color:var(--sub);border:1px solid var(--bdr)}

/* Volume row */
.mc-meta{display:flex;gap:12px;flex-wrap:wrap}
.mc-meta-item{font-family:'JetBrains Mono',monospace;font-size:9px;color:rgba(255,255,255,.3);display:flex;align-items:center;gap:4px}
.mc-meta-item em{color:rgba(255,255,255,.6);font-style:normal}
.mc-link{font-family:'JetBrains Mono',monospace;font-size:8px;color:rgba(155,89,214,.45);margin-top:2px}

/* HOT badge */
.hot-badge{font-family:'JetBrains Mono',monospace;font-size:7px;font-weight:700;padding:2px 6px;border-radius:3px;background:rgba(249,115,22,.15);color:#f97316;border:1px solid rgba(249,115,22,.3);letter-spacing:.06em}

/* PLACEHOLDER */
.placeholder{text-align:center;padding:60px 20px;font-family:'JetBrains Mono',monospace;font-size:11px;color:rgba(255,255,255,.2);grid-column:1/-1}
.placeholder .ico{font-size:32px;display:block;margin-bottom:12px}
.ld-bar{width:160px;height:2px;background:var(--bdr);border-radius:2px;margin:14px auto 0;overflow:hidden}
.ld-fill{height:100%;background:var(--accent);border-radius:2px;animation:lda 1.3s ease-in-out infinite}
@keyframes lda{0%{width:0;margin-left:0}50%{width:100%;margin-left:0}100%{width:0;margin-left:100%}}
.err{background:rgba(232,57,42,.07);border:1px solid rgba(232,57,42,.18);border-radius:8px;padding:14px;font-family:'JetBrains Mono',monospace;font-size:11px;color:#ff9999;line-height:1.7;grid-column:1/-1}

@media(max-width:600px){.topbar,.hero,.grid{padding-left:14px;padding-right:14px}.grid{grid-template-columns:1fr}}
</style>
</head>

    <div class="tb-dot" id="tbDot"></div>
    <div class="tb-pill">Markets: <em id="tbCount">&#8212;</em></div>

<div class="hero">
  <div class="hero-k">ZIMR Capital &middot; Intelligence</div>
  <h1 class="hero-t">Polymarket <span>Intelligence</span></h1>
  <div class="filters">
    <button class="f-btn on" onclick="sf('all',this)">ALL</button>
    <button class="f-btn" onclick="sf('crypto',this)">CRYPTO</button>
    <button class="f-btn" onclick="sf('politics',this)">POLITICS</button>
    <button class="f-btn" onclick="sf('sports',this)">SPORTS</button>
    <button class="f-btn" onclick="sf('movers',this)">BIG MOVERS</button>
    <button class="f-btn" onclick="sf('high',this)">HIGH PROB &gt;70%</button>
    <button class="f-btn" onclick="sf('low',this)">LOW PROB &lt;30%</button>
  </div>
</div>

<div class="stats" id="statsRow" style="display:none">
  <div class="stat-box"><div class="stat-num" style="color:var(--accent)" id="st-total">0</div><div class="stat-lbl">Active Markets</div></div>
  <div class="stat-box"><div class="stat-num" style="color:#f97316" id="st-vol">$0</div><div class="stat-lbl">Total Volume</div></div>
  <div class="stat-box"><div class="stat-num" style="color:var(--grn)" id="st-up">0</div><div class="stat-lbl">Moving Up</div></div>
  <div class="stat-box"><div class="stat-num" style="color:var(--red)" id="st-dn">0</div><div class="stat-lbl">Moving Down</div></div>
</div>

<div class="grid" id="grid">
  <div class="placeholder">
    <span class="ico">&#127919;</span>
    <p>Loading Polymarket data...<br><span style="font-size:9px;opacity:.4">Prediction markets &middot; Real money &middot; Live odds</span></p>
    <div class="ld-bar"><div class="ld-fill"></div></div>
  </div>
</div>

<script>
var allMarkets = [], activeFilter = 'all';

function fmtVol(v) {
  if(!v) return '$0';
  v = parseFloat(v);
  if(v >= 1e6) return '$' + (v/1e6).toFixed(1) + 'M';
  if(v >= 1e3) return '$' + (v/1e3).toFixed(0) + 'K';
  return '$' + Math.round(v);
}

function fmtProb(p) {
  if(!p) return 0;
  var v = parseFloat(p);
  if(v > 1) return Math.round(v);
  return Math.round(v * 100);
}

function getCategory(market) {
  var tags = (market.tags || []).map(function(t){ return (t.label||t.slug||'').toLowerCase(); });
  var q = (market.question || '').toLowerCase();
  if(tags.some(function(t){ return t.includes('crypto')||t.includes('bitcoin')||t.includes('eth')||t.includes('solana')||t.includes('defi'); }) ||
     q.includes('btc')||q.includes('bitcoin')||q.includes('ethereum')||q.includes('crypto')||q.includes('sol ')||q.includes('price')) return 'crypto';
  if(tags.some(function(t){ return t.includes('polit')||t.includes('election')||t.includes('govern')||t.includes('trump')||t.includes('president'); }) ||
     q.includes('election')||q.includes('president')||q.includes('congress')||q.includes('senate')||q.includes('trump')||q.includes('biden')) return 'politics';
  if(tags.some(function(t){ return t.includes('sport')||t.includes('nba')||t.includes('nfl')||t.includes('soccer')||t.includes('tennis'); }) ||
     q.includes('championship')||q.includes('world cup')||q.includes('nba')||q.includes('nfl')||q.includes('match')) return 'sports';
  return 'other';
}

function catLabel(cat) {
  return {crypto:'CRYPTO',politics:'POLITICS',sports:'SPORTS',other:'OTHER'}[cat]||'OTHER';
}
function catClass(cat) {
  return 'cat-'+cat;
}

function sf(f, btn) {
  activeFilter = f;
  document.querySelectorAll('.f-btn').forEach(function(b){ b.classList.remove('on'); });
  btn.classList.add('on');
  render(filtered());
}

function filtered() {
  return allMarkets.filter(function(m) {
    if(activeFilter === 'all') return true;
    if(activeFilter === 'crypto') return m._cat === 'crypto';
    if(activeFilter === 'politics') return m._cat === 'politics';
    if(activeFilter === 'sports') return m._cat === 'sports';
    if(activeFilter === 'movers') return Math.abs(m._change) >= 5;
    if(activeFilter === 'high') return m._prob >= 70;
    if(activeFilter === 'low') return m._prob <= 30;
    return true;
  });
}

function render(markets) {
  var grid = document.getElementById('grid');
  if(!markets.length) {
    grid.innerHTML = '<div class="placeholder"><span class="ico">&#128269;</span><p>No markets match this filter</p></div>';
    return;
  }

  var html = markets.map(function(m, i) {
    var prob = m._prob;
    var cat = m._cat;
    var vol24 = fmtVol(m.volume24hr || m.volume);
    var volTotal = fmtVol(m.volumeNum || m.volume);
    var change = m._change;
    var chClass = change > 2 ? 'ch-up' : change < -2 ? 'ch-dn' : 'ch-flat';
    var chText = change > 0 ? '+' + change.toFixed(1) + '%' : change.toFixed(1) + '%';
    var barColor = prob > 60 ? '#27ae60' : prob > 40 ? '#f5c518' : '#e8392a';
    var url = 'https://polymarket.com/event/' + (m.slug || m.conditionId || '');
    var isHot = parseFloat(m.volume24hr||0) > 100000;

    return '<a class="mcard ' + cat + '" href="' + url + '" target="_blank" rel="noopener" style="animation-delay:' + (i*0.04) + 's">' +
      '<div class="mc-head">' +
        '<span class="mc-cat ' + catClass(cat) + '">' + catLabel(cat) + '</span>' +
        (isHot ? '<span class="hot-badge">&#128293; HOT</span>' : '') +
        '<span class="change-badge ' + chClass + '">' + chText + '</span>' +
      '</div>' +
      '<div class="mc-q">' + (m.question || '') + '</div>' +
      '<div class="prob-row">' +
        '<div class="prob-yes" style="color:' + barColor + '">' + prob + '%</div>' +
        '<div class="prob-bar-wrap">' +
          '<div class="prob-bar-track"><div class="prob-bar-yes" style="width:' + prob + '%;background:' + barColor + '"></div></div>' +
          '<div class="prob-labels"><span>YES</span><span>NO ' + (100-prob) + '%</span></div>' +
        '</div>' +
      '</div>' +
      '<div class="mc-meta">' +
        '<div class="mc-meta-item">Vol 24h: <em>' + vol24 + '</em></div>' +
        '<div class="mc-meta-item">Total: <em>' + volTotal + '</em></div>' +
        (m.endDate ? '<div class="mc-meta-item">Ends: <em>' + new Date(m.endDate).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'}) + '</em></div>' : '') +
      '</div>' +
      '<div class="mc-link">&#8599; polymarket.com</div>' +
    '</a>';
  }).join('');

  grid.innerHTML = html;
}

function updateStats(markets) {
  var totalVol = markets.reduce(function(s,m){ return s + parseFloat(m.volume||0); }, 0);
  var up = markets.filter(function(m){ return m._change > 2; }).length;
  var dn = markets.filter(function(m){ return m._change < -2; }).length;
  document.getElementById('st-total').textContent = markets.length;
  document.getElementById('st-vol').textContent = fmtVol(totalVol);
  document.getElementById('st-up').textContent = up;
  document.getElementById('st-dn').textContent = dn;
  document.getElementById('statsRow').style.display = 'flex';
  document.getElementById('tbCount').textContent = markets.length;
}

async function load() {
  var dot = document.getElementById('tbDot');
  var grid = document.getElementById('grid');
  dot.style.background = '#f5c518';
  document.getElementById('statsRow').style.display = 'none';
  grid.innerHTML = '<div class="placeholder"><span class="ico">&#9889;</span><p>Fetching Polymarket data...</p><div class="ld-bar"><div class="ld-fill"></div></div></div>';

  try {
    // Fetch top markets by volume
    var url = 'https://zimr-proxy.vercel.app/api/polymarket';
    var r = await fetch(url);
    if(!r.ok) throw new Error('HTTP ' + r.status);
    var data = await r.json();

    var markets = Array.isArray(data) ? data : (data.markets || data.data || []);
    if(!markets.length) throw new Error('No markets returned');

    // Process markets
    allMarkets = markets.map(function(m) {
      // Get YES probability
      var prob = 50;
      try {
        var prices = typeof m.outcomePrices === 'string' ? JSON.parse(m.outcomePrices) : m.outcomePrices;
        if(prices && prices.length) prob = Math.round(parseFloat(prices[0]) * 100);
      } catch(e) {
        if(m.lastTradePrice) prob = Math.round(parseFloat(m.lastTradePrice) * 100);
      }

      // Get 24h change
      var change = 0;
      if(m.oneDayPriceChange) change = parseFloat(m.oneDayPriceChange) * 100;
      else if(m.price24hChange) change = parseFloat(m.price24hChange) * 100;

      m._prob = Math.max(1, Math.min(99, prob));
      m._change = parseFloat(change.toFixed(1));
      m._cat = getCategory(m);
      return m;
    });

    // Sort by volume24hr desc
    allMarkets.sort(function(a,b){ return parseFloat(b.volume24hr||0) - parseFloat(a.volume24hr||0); });

    updateStats(allMarkets);
    render(filtered());
    dot.style.background = '#00e676';

  } catch(e) {
    grid.innerHTML = '<div class="err">&#9888; ' + e.message + '<br><span style="font-size:9px;opacity:.6">Polymarket API may be temporarily unavailable</span></div>';
    dot.style.background = '#e8392a';
  }
}

window.addEventListener('load', load);
</script>
</body>
</html>
