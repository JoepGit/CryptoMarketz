<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Polymarket Intelligence &mdash; ZIMR Capital</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{--accent:#9b59d6;--bg:#0d0d0d;--card:#111111;--bdr:rgba(255,255,255,.07);--sub:#8a8078;--cream:#e8e0d8;--grn:#27ae60;--red:#e8392a;--yel:#f5c518;--orange:#f97316}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Plus Jakarta Sans',sans-serif;background:var(--bg);color:var(--cream);min-height:100vh;-webkit-font-smoothing:antialiased}

.topbar{display:flex;align-items:center;justify-content:space-between;padding:0 28px;height:56px;background:linear-gradient(180deg,#151515,#111111);border-bottom:1px solid var(--bdr);position:sticky;top:0;z-index:50;gap:12px}
.tb-left{display:flex;align-items:center;gap:14px}
.tb-back{display:flex;align-items:center;gap:6px;font-family:'JetBrains Mono',monospace;font-size:9px;letter-spacing:.06em;color:var(--sub);text-decoration:none;padding:6px 12px;border:1px solid var(--bdr);border-radius:5px;transition:all .15s;background:rgba(255,255,255,.03)}
.tb-back:hover{color:var(--accent);border-color:rgba(155,89,214,.3)}
.tb-brand{display:flex;align-items:center;gap:10px}
.tb-bname{font-size:17px;font-weight:800;color:#fff}
.tb-bname span{color:var(--accent)}
.tb-right{display:flex;align-items:center;gap:8px}
.tb-pill{font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--sub);background:rgba(255,255,255,.04);border:1px solid var(--bdr);padding:4px 11px;border-radius:20px}
.tb-pill em{color:var(--accent);font-style:normal}
.tb-dot{width:7px;height:7px;border-radius:50%;background:var(--grn);animation:pulse 1.5s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.btn{background:var(--accent);color:#fff;font-family:'JetBrains Mono',monospace;font-size:9px;font-weight:700;border:none;padding:8px 18px;border-radius:6px;cursor:pointer;letter-spacing:.08em;transition:opacity .15s}
.btn:hover{opacity:.85}
.btn:disabled{opacity:.35;cursor:not-allowed}
.btn-outline{background:transparent;color:var(--accent);border:1px solid rgba(155,89,214,.4);font-family:'JetBrains Mono',monospace;font-size:9px;font-weight:700;padding:8px 18px;border-radius:6px;cursor:pointer;letter-spacing:.08em;transition:all .15s}
.btn-outline:hover{background:rgba(155,89,214,.1)}
.btn-outline:disabled{opacity:.35;cursor:not-allowed}

/* HERO */
.hero{padding:20px 28px 16px;border-bottom:1px solid var(--bdr);display:flex;align-items:flex-start;justify-content:space-between;gap:16px;flex-wrap:wrap}
.hero-left{}
.hero-k{font-family:'JetBrains Mono',monospace;font-size:9px;font-weight:700;letter-spacing:.14em;color:rgba(155,89,214,.65);text-transform:uppercase;margin-bottom:6px}
.hero-t{font-size:22px;font-weight:800;letter-spacing:-.4px;margin-bottom:12px}
.hero-t span{color:var(--accent)}
.filters{display:flex;gap:6px;flex-wrap:wrap}
.f-btn{font-family:'JetBrains Mono',monospace;font-size:9px;padding:6px 13px;border-radius:5px;border:1px solid var(--bdr);background:rgba(255,255,255,.04);color:var(--sub);cursor:pointer;letter-spacing:.06em;transition:all .15s}
.f-btn:hover,.f-btn.on{border-color:rgba(155,89,214,.4);color:var(--accent);background:rgba(155,89,214,.1)}
.hero-right{display:flex;gap:8px;align-items:center;flex-shrink:0}

/* AI SUMMARY BOX */
.ai-box{margin:16px 28px;background:linear-gradient(135deg,rgba(155,89,214,.08),rgba(59,130,246,.05));border:1px solid rgba(155,89,214,.2);border-radius:12px;padding:18px 20px;display:none}
.ai-box.on{display:block}
.ai-header{display:flex;align-items:center;gap:10px;margin-bottom:12px}
.ai-icon{width:28px;height:28px;border-radius:8px;background:linear-gradient(135deg,#9b59d6,#3b82f6);display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0}
.ai-title{font-size:13px;font-weight:700;color:var(--cream)}
.ai-sub{font-family:'JetBrains Mono',monospace;font-size:8px;color:var(--sub);margin-top:1px}
.ai-body{font-size:13px;line-height:1.7;color:rgba(255,255,255,.75)}
.ai-body p{margin-bottom:8px}
.ai-body p:last-child{margin-bottom:0}
.ai-loading{display:flex;align-items:center;gap:10px;font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--sub)}
.ai-spin{width:14px;height:14px;border:2px solid rgba(155,89,214,.2);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite;flex-shrink:0}
@keyframes spin{to{transform:rotate(360deg)}}

/* OPPORTUNITY ALERTS */
.section{padding:16px 28px 0}
.sec-hdr{font-family:'JetBrains Mono',monospace;font-size:9px;font-weight:700;letter-spacing:.12em;color:rgba(155,89,214,.5);text-transform:uppercase;margin-bottom:10px;display:flex;align-items:center;gap:8px}
.sec-hdr::after{content:'';flex:1;height:1px;background:var(--bdr)}

/* Alert cards */
.alerts{display:flex;flex-direction:column;gap:8px;margin-bottom:4px}
.alert-card{background:var(--card);border:1px solid var(--bdr);border-radius:10px;padding:14px 16px;display:grid;grid-template-columns:auto 1fr auto;gap:14px;align-items:center;text-decoration:none;color:inherit;transition:all .15s;animation:fadeIn .3s ease both}
.alert-card:hover{border-color:rgba(155,89,214,.3);background:#141414}
@keyframes fadeIn{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:translateY(0)}}

/* Alert icon */
.al-icon{width:40px;height:40px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.al-up{background:rgba(39,174,96,.1);border:1px solid rgba(39,174,96,.2)}
.al-dn{background:rgba(232,57,42,.08);border:1px solid rgba(232,57,42,.2)}
.al-vol{background:rgba(249,115,22,.08);border:1px solid rgba(249,115,22,.2)}
.al-mis{background:rgba(155,89,214,.08);border:1px solid rgba(155,89,214,.2)}

/* Alert main */
.al-main{}
.al-type{font-family:'JetBrains Mono',monospace;font-size:8px;font-weight:700;letter-spacing:.08em;margin-bottom:4px}
.al-type.up{color:var(--grn)}
.al-type.dn{color:var(--red)}
.al-type.vol{color:var(--orange)}
.al-type.mis{color:var(--accent)}
.al-q{font-size:13px;font-weight:700;line-height:1.3;margin-bottom:5px;color:var(--cream)}
.al-why{font-family:'JetBrains Mono',monospace;font-size:9px;color:rgba(255,255,255,.38);line-height:1.4}

/* Alert stat */
.al-stat{text-align:right;flex-shrink:0;min-width:80px}
.al-prob{font-family:'JetBrains Mono',monospace;font-size:20px;font-weight:800;margin-bottom:3px}
.al-change{font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:700;padding:2px 8px;border-radius:4px;display:inline-block}
.al-change.up{background:rgba(39,174,96,.12);color:var(--grn)}
.al-change.dn{background:rgba(232,57,42,.1);color:var(--red)}
.al-vol-num{font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--sub);margin-top:4px}

/* MARKET GRID */
.grid{padding:16px 28px 60px;display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:10px}
.mcard{background:var(--card);border:1px solid var(--bdr);border-radius:10px;padding:14px;cursor:pointer;text-decoration:none;color:inherit;transition:all .15s;animation:fadeIn .3s ease both;display:flex;flex-direction:column;gap:9px;position:relative;overflow:hidden}
.mcard:hover{border-color:rgba(155,89,214,.3);background:#141414;transform:translateY(-1px)}
.mcard::before{content:'';position:absolute;top:0;left:0;right:0;height:2px}
.mcard.crypto::before{background:linear-gradient(90deg,#f97316,#f5c518)}
.mcard.politics::before{background:linear-gradient(90deg,#3b82f6,#8b5cf6)}
.mcard.sports::before{background:linear-gradient(90deg,#27ae60,#06b6d4)}
.mcard.other::before{background:linear-gradient(90deg,#9b59d6,#3b82f6)}
.mc-top{display:flex;align-items:center;justify-content:space-between;gap:8px}
.mc-cat{font-family:'JetBrains Mono',monospace;font-size:7px;font-weight:700;letter-spacing:.1em;padding:2px 7px;border-radius:3px;text-transform:uppercase}
.cat-crypto{background:rgba(249,115,22,.12);color:#f97316;border:1px solid rgba(249,115,22,.25)}
.cat-politics{background:rgba(59,130,246,.1);color:#60a5fa;border:1px solid rgba(59,130,246,.2)}
.cat-sports{background:rgba(39,174,96,.1);color:#27ae60;border:1px solid rgba(39,174,96,.2)}
.cat-other{background:rgba(155,89,214,.1);color:var(--accent);border:1px solid rgba(155,89,214,.2)}
.mc-chg{font-family:'JetBrains Mono',monospace;font-size:9px;font-weight:700;padding:2px 7px;border-radius:4px}
.chg-up{background:rgba(39,174,96,.1);color:var(--grn)}
.chg-dn{background:rgba(232,57,42,.08);color:var(--red)}
.chg-flat{background:rgba(255,255,255,.04);color:var(--sub)}
.mc-q{font-size:13px;font-weight:700;line-height:1.35;color:var(--cream)}
.prob-row{display:flex;align-items:center;gap:10px}
.prob-pct{font-family:'JetBrains Mono',monospace;font-size:20px;font-weight:800;flex-shrink:0}
.prob-bars{flex:1}
.prob-track{width:100%;height:5px;background:rgba(255,255,255,.06);border-radius:3px;overflow:hidden;margin-bottom:3px}
.prob-fill{height:100%;border-radius:3px}
.prob-lbl{display:flex;justify-content:space-between;font-family:'JetBrains Mono',monospace;font-size:8px;color:rgba(255,255,255,.25)}
.mc-meta{display:flex;gap:10px;flex-wrap:wrap}
.mc-mi{font-family:'JetBrains Mono',monospace;font-size:8px;color:rgba(255,255,255,.28)}
.mc-mi em{color:rgba(255,255,255,.55);font-style:normal}
.mc-cg{font-family:'JetBrains Mono',monospace;font-size:8px;color:rgba(155,89,214,.4)}

.placeholder{text-align:center;padding:50px 20px;font-family:'JetBrains Mono',monospace;font-size:11px;color:rgba(255,255,255,.2);grid-column:1/-1}
.ld-bar{width:140px;height:2px;background:var(--bdr);border-radius:2px;margin:12px auto 0;overflow:hidden}
.ld-fill{height:100%;background:var(--accent);border-radius:2px;animation:lda 1.3s ease-in-out infinite}
@keyframes lda{0%{width:0;margin-left:0}50%{width:100%;margin-left:0}100%{width:0;margin-left:100%}}

@media(max-width:600px){.topbar,.hero,.section,.grid,.ai-box{padding-left:14px;padding-right:14px}.grid{grid-template-columns:1fr}.alert-card{grid-template-columns:auto 1fr}}
</style>
</head>

<script>
var allMarkets = [], activeFilter = 'all';

function fmtVol(v){
  v=parseFloat(v||0);
  if(v>=1e6) return '$'+(v/1e6).toFixed(1)+'M';
  if(v>=1e3) return '$'+(v/1e3).toFixed(0)+'K';
  return '$'+Math.round(v);
}

function getCategory(m){
  var tags=(m.tags||[]).map(function(t){return(t.label||t.slug||'').toLowerCase();});
  var q=(m.question||'').toLowerCase();
  if(tags.some(function(t){return t.includes('crypto')||t.includes('bitcoin')||t.includes('defi')||t.includes('token');})
     ||q.match(/btc|bitcoin|ethereum|eth |crypto|solana|sol |price target|binance/)) return 'crypto';
  if(tags.some(function(t){return t.includes('polit')||t.includes('elect')||t.includes('govern');})
     ||q.match(/election|president|congress|senate|trump|biden|minister|vote|war|nato|sanctions/)) return 'politics';
  if(tags.some(function(t){return t.includes('sport')||t.includes('nba')||t.includes('nfl')||t.includes('soccer')||t.includes('tennis')||t.includes('fifa');})
     ||q.match(/championship|world cup|nba|nfl|match|tournament|league|win the/)) return 'sports';
  return 'other';
}

function getProb(m){
  try {
    var p = typeof m.outcomePrices==='string' ? JSON.parse(m.outcomePrices) : m.outcomePrices;
    if(p&&p.length) return Math.round(parseFloat(p[0])*100);
  } catch(e){}
  if(m.lastTradePrice) return Math.round(parseFloat(m.lastTradePrice)*100);
  return 50;
}

function getChange(m){
  if(m.oneDayPriceChange) return parseFloat(m.oneDayPriceChange)*100;
  if(m.price24hChange) return parseFloat(m.price24hChange)*100;
  return 0;
}

function sf(f,btn){
  activeFilter=f;
  document.querySelectorAll('.f-btn').forEach(function(b){b.classList.remove('on');});
  btn.classList.add('on');
  var list=filtered();
  document.getElementById('marketsHdr').textContent=list.length+' Markets';
  renderGrid(list);
}

function filtered(){
  return allMarkets.filter(function(m){
    if(activeFilter==='all') return true;
    if(activeFilter==='crypto') return m._cat==='crypto';
    if(activeFilter==='politics') return m._cat==='politics';
    if(activeFilter==='sports') return m._cat==='sports';
    if(activeFilter==='movers') return Math.abs(m._change)>=5;
    if(activeFilter==='high') return m._prob>=70;
    if(activeFilter==='low') return m._prob<=30;
    return true;
  });
}

// ── OPPORTUNITY ALERTS ──
function buildAlerts(markets){
  var alerts=[];

  // Big movers up (>5% in 24h)
  markets.filter(function(m){return m._change>=5;})
    .sort(function(a,b){return b._change-a._change;})
    .slice(0,2).forEach(function(m){
      alerts.push({
        type:'up', icon:'&#128200;',
        typeLabel:'SURGING UP',
        iconClass:'al-up',
        q:m.question,
        why:'Up '+m._change.toFixed(1)+'% today — strong buying pressure, possible news catalyst',
        prob:m._prob,
        change:'+'+m._change.toFixed(1)+'%',
        vol:fmtVol(m.volume24hr),
        url:'https://polymarket.com/event/'+(m.slug||'')
      });
    });

  // Big movers down (>5% drop)
  markets.filter(function(m){return m._change<=-5;})
    .sort(function(a,b){return a._change-b._change;})
    .slice(0,2).forEach(function(m){
      alerts.push({
        type:'dn', icon:'&#128201;',
        typeLabel:'DROPPING FAST',
        iconClass:'al-dn',
        q:m.question,
        why:'Down '+Math.abs(m._change).toFixed(1)+'% today — market repricing, sellers in control',
        prob:m._prob,
        change:m._change.toFixed(1)+'%',
        vol:fmtVol(m.volume24hr),
        url:'https://polymarket.com/event/'+(m.slug||'')
      });
    });

  // Volume spikes — high 24h vol relative to total
  markets.filter(function(m){
    var r=parseFloat(m.volume24hr||0)/Math.max(parseFloat(m.volume||1),1);
    return r>0.15 && Math.abs(m._change)<3;
  }).sort(function(a,b){return parseFloat(b.volume24hr||0)-parseFloat(a.volume24hr||0);})
    .slice(0,2).forEach(function(m){
      alerts.push({
        type:'vol', icon:'&#128293;',
        typeLabel:'VOLUME SPIKE',
        iconClass:'al-vol',
        q:m.question,
        why:'Huge volume but price barely moved — smart money accumulating quietly',
        prob:m._prob,
        change:'flat',
        vol:fmtVol(m.volume24hr),
        url:'https://polymarket.com/event/'+(m.slug||'')
      });
    });

  // Potential mispricing — extreme probability (<5% or >95%) with high volume
  markets.filter(function(m){
    return (m._prob<=5||m._prob>=95) && parseFloat(m.volume24hr||0)>50000;
  }).slice(0,1).forEach(function(m){
    var side = m._prob<=5 ? 'near zero' : 'near certain';
    alerts.push({
      type:'mis', icon:'&#129300;',
      typeLabel:'POSSIBLE MISPRICING',
      iconClass:'al-mis',
      q:m.question,
      why:'Market at '+m._prob+'% ('+side+') with high volume — is the market right? High risk/reward',
      prob:m._prob,
      change:(m._change>0?'+':'')+m._change.toFixed(1)+'%',
      vol:fmtVol(m.volume24hr),
      url:'https://polymarket.com/event/'+(m.slug||'')
    });
  });

  return alerts.slice(0,6);
}

function renderAlerts(alerts){
  var sec=document.getElementById('alertsSection');
  var el=document.getElementById('alerts');
  if(!alerts.length){sec.style.display='none';return;}
  sec.style.display='block';
  el.innerHTML=alerts.map(function(a,i){
    var probColor=a.prob>60?'var(--grn)':a.prob>40?'var(--yel)':'var(--red)';
    var chClass=a.type==='up'?'up':a.type==='dn'?'dn':'flat';
    return '<a class="alert-card" href="'+a.url+'" target="_blank" rel="noopener" style="animation-delay:'+(i*0.06)+'s">'+
      '<div class="al-icon '+a.iconClass+'">'+a.icon+'</div>'+
      '<div class="al-main">'+
        '<div class="al-type '+a.type+'">'+a.typeLabel+'</div>'+
        '<div class="al-q">'+a.q+'</div>'+
        '<div class="al-why">'+a.why+'</div>'+
      '</div>'+
      '<div class="al-stat">'+
        '<div class="al-prob" style="color:'+probColor+'">'+a.prob+'%</div>'+
        '<div class="al-change '+(a.change==='flat'?'flat':chClass)+'">'+a.change+'</div>'+
        '<div class="al-vol-num">Vol: '+a.vol+'</div>'+
      '</div>'+
    '</a>';
  }).join('');
}

function renderGrid(markets){
  var grid=document.getElementById('grid');
  if(!markets.length){
    grid.innerHTML='<div class="placeholder">No markets match this filter</div>';
    return;
  }
  grid.innerHTML=markets.map(function(m,i){
    var prob=m._prob, cat=m._cat, change=m._change;
    var barColor=prob>60?'#27ae60':prob>40?'#f5c518':'#e8392a';
    var chCls=change>2?'chg-up':change<-2?'chg-dn':'chg-flat';
    var chTxt=(change>0?'+':'')+change.toFixed(1)+'%';
    var url='https://polymarket.com/event/'+(m.slug||'');
    return '<a class="mcard '+cat+'" href="'+url+'" target="_blank" rel="noopener" style="animation-delay:'+(i*0.03)+'s">'+
      '<div class="mc-top">'+
        '<span class="mc-cat cat-'+cat+'">'+cat.toUpperCase()+'</span>'+
        '<span class="mc-chg '+chCls+'">'+chTxt+'</span>'+
      '</div>'+
      '<div class="mc-q">'+m.question+'</div>'+
      '<div class="prob-row">'+
        '<div class="prob-pct" style="color:'+barColor+'">'+prob+'%</div>'+
        '<div class="prob-bars">'+
          '<div class="prob-track"><div class="prob-fill" style="width:'+prob+'%;background:'+barColor+'"></div></div>'+
          '<div class="prob-lbl"><span>YES</span><span>NO '+(100-prob)+'%</span></div>'+
        '</div>'+
      '</div>'+
      '<div class="mc-meta">'+
        '<div class="mc-mi">24h vol: <em>'+fmtVol(m.volume24hr)+'</em></div>'+
        (m.endDate?'<div class="mc-mi">Ends: <em>'+new Date(m.endDate).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'})+'</em></div>':'')+
      '</div>'+
      '<div class="mc-cg">&#8599; polymarket.com</div>'+
    '</a>';
  }).join('');
}

// ── DAILY BRIEF ──
async function loadBrief(){
  var btn=document.getElementById('aiBtn');
  var box=document.getElementById('aiBox');
  var body=document.getElementById('aiBody');
  var timeEl=document.getElementById('aiTime');
  btn.disabled=true; btn.textContent='Loading...';
  box.classList.add('on');
  body.innerHTML='<div class="ai-loading"><div class="ai-spin"></div>Loading daily brief...</div>';
  try {
    var r=await fetch('https://raw.githubusercontent.com/SevillaWZRD/CryptoMarketz/main/data/polymarket-brief.json?'+Date.now());
    if(!r.ok) throw new Error('Brief not available yet');
    var data=await r.json();
    var html=data.brief.split('

').filter(function(p){return p.trim();})
      .map(function(p){return '<p>'+p.trim().replace(/
/g,'<br>')+'</p>';}).join('');
    body.innerHTML=html;
    timeEl.textContent=data.date+' — updated at 09:00';
  } catch(e){
    body.innerHTML='<p style="color:var(--sub)">No brief available yet — generated daily at 09:00 Amsterdam time. <a href="#" onclick="runManual()" style="color:var(--accent)">Run now?</a></p>';
    timeEl.textContent='Not yet generated today';
  }
  btn.disabled=false; btn.textContent='&#10024; Daily Brief';
}

async function runManual(){
  // Fallback: show top movers as a simple summary
  var box=document.getElementById('aiBox');
  var body=document.getElementById('aiBody');
  box.classList.add('on');
  if(!allMarkets.length){body.innerHTML='<p>Load markets first</p>';return;}
  var movers=allMarkets.filter(function(m){return Math.abs(m._change)>=3;})
    .sort(function(a,b){return Math.abs(b._change)-Math.abs(a._change);}).slice(0,5);
  if(!movers.length){body.innerHTML='<p style="color:var(--sub)">No significant movers today — markets are calm.</p>';return;}
  var html='<p><strong>Top movers today:</strong></p>'+
    movers.map(function(m){
      var dir=m._change>0?'&#128200; up':'&#128201; down';
      return '<p>'+dir+' <strong>'+Math.abs(m._change).toFixed(1)+'%</strong> — '+m.question+' now at <strong>'+m._prob+'%</strong></p>';
    }).join('');
  body.innerHTML=html;
  document.getElementById('aiTime').textContent='Live data — '+new Date().toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit'});
}

async function load(){
  var dot=document.getElementById('tbDot');
  var grid=document.getElementById('grid');
  dot.style.background='#f5c518';
  document.getElementById('alertsSection').style.display='none';
  grid.innerHTML='<div class="placeholder"><span style="font-size:28px;display:block;margin-bottom:10px">&#9889;</span>Fetching markets...<div class="ld-bar"><div class="ld-fill"></div></div></div>';

  try {
    var r=await fetch('https://zimr-proxy.vercel.app/api/polymarket');
    if(!r.ok) throw new Error('HTTP '+r.status);
    var data=await r.json();
    var markets=Array.isArray(data)?data:(data.markets||data.data||[]);
    if(!markets.length) throw new Error('No markets returned');

    allMarkets=markets.map(function(m){
      m._prob=Math.max(1,Math.min(99,getProb(m)));
      m._change=parseFloat(getChange(m).toFixed(1));
      m._cat=getCategory(m);
      return m;
    }).sort(function(a,b){return parseFloat(b.volume24hr||0)-parseFloat(a.volume24hr||0);});

    document.getElementById('tbCount').textContent=allMarkets.length;
    document.getElementById('marketsHdr').textContent=allMarkets.length+' Markets';
    dot.style.background='#00e676';

    renderAlerts(buildAlerts(allMarkets));
    renderGrid(filtered());

  } catch(e){
    grid.innerHTML='<div style="background:rgba(232,57,42,.07);border:1px solid rgba(232,57,42,.18);border-radius:8px;padding:14px;font-family:JetBrains Mono,monospace;font-size:11px;color:#ff9999;grid-column:1/-1">&#9888; '+e.message+'</div>';
    dot.style.background='#e8392a';
  }
}

window.addEventListener('load',load);
</script>
